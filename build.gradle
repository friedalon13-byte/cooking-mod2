name: Build Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install Gradle 8.8
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Make wrapper
        run: gradle wrapper --gradle-version 8.8 --distribution-type bin

      - name: Build
        run: ./gradlew build

      - uses: actions/upload-artifact@v4
        with:
          name: cold-advanced-cooking-jar
          path: build/libs/*.jar
